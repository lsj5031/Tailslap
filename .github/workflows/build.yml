name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-framework-dependent:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore -r win-x64
      working-directory: ./TailSlap

    - name: Publish Framework-Dependent
      run: dotnet publish -c Release --no-restore -o "${{ github.workspace }}\artifacts\framework-dependent"
      working-directory: ./TailSlap

    - name: Upload Framework-Dependent Build
      uses: actions/upload-artifact@v6
      with:
        name: TailSlap-framework-dependent
        path: artifacts/framework-dependent/
        if-no-files-found: error

  build-self-contained:
    runs-on: windows-latest
    timeout-minutes: 5
    
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore -r win-x64
      working-directory: ./TailSlap

    - name: Publish Self-Contained
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true
      working-directory: ./TailSlap

    - name: Upload Self-Contained Build
      uses: actions/upload-artifact@v6
      with:
        name: TailSlap-self-contained
        path: TailSlap/bin/Release/net9.0-windows/win-x64/publish/TailSlap.exe
        if-no-files-found: error
