name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Restore tools
      run: dotnet tool restore

    - name: Check Formatting
      run: dotnet csharpier check .

    - name: Build Release
      run: dotnet build -c Release --no-restore

    - name: Run Tests
      run: dotnet test -c Release --no-build --verbosity normal

    - name: Diagnose lingering build processes
      if: always()
      shell: powershell
      run: |
        $targets = @(
          'dotnet.exe',
          'testhost.exe',
          'testhost.x86.exe',
          'vstest.console.exe',
          'MSBuild.exe',
          'VBCSCompiler.exe',
          'git.exe'
        )

        Write-Host 'Checking for lingering build/test processes before post-job cleanup...'

        $procs = Get-CimInstance Win32_Process |
          Where-Object { $targets -contains $_.Name } |
          Sort-Object Name, ProcessId

        if (-not $procs) {
          Write-Host 'No matching lingering processes found.'
          exit 0
        }

        $procs |
          Select-Object Name, ProcessId, ParentProcessId, ThreadCount, HandleCount, ExecutablePath, CommandLine |
          Format-List

  build-self-contained:
    runs-on: windows-latest
    timeout-minutes: 5
    
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore -r win-x64
      working-directory: ./TailSlap

    - name: Publish Self-Contained
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true
      working-directory: ./TailSlap

    - name: Upload Self-Contained Build
      uses: actions/upload-artifact@v6
      with:
        name: TailSlap-self-contained
        path: TailSlap/bin/Release/net9.0-windows/win-x64/publish/TailSlap.exe
        if-no-files-found: error
